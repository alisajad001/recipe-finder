<!DOCTYPE html>
<html lang="en">
<head>
    <title>Recipe Finder</title>

    <!-- Metadata -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="favicon/favicon.ico" rel="icon" type="image/x-icon" />

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utilities.css">

    <!-- Fontawesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Raleway Font Family from Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <!-- Header - srtart -->
        <header id="header" class="flex">
            <div class="head-top flex just-between align-center">
                <a href="#" class="logo">Recipe <span class="highlight">Finder</span></a>
                <a href="#">Favorites <i class="fa-solid fa-heart"></i></a>
            </div>
            <label for="searchInput" class="search-input flex just-between align-center">
                <input type="text" id="searchInput" placeholder="Search for recipes...">
                <button class="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </label>
        </header>
        <!-- Header - end -->

        <!-- Search Results - srtart -->
        <section id="search-results" class="flex">
            <h2>Search results: <span id="search-result"></span></h2>
            <div class="search-result-cards flex">
                <img src="favicon/loader.gif" alt="" class="loader">
            </div>
        </section>
        <!-- Search Results - end -->
    </main>

    <footer id="footer" class="flex align-center">
        <h2>Recipe Finder</h2>
        <p>Created with <i class="fa-solid fa-heart"></i> by Ali Sajad Ahamdi</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
